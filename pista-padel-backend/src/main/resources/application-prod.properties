# ============================================================
# Perfil PRODUCCIÓN (--spring.profiles.active=prod)
# Logs reducidos, correo real activado, consola H2 desactivada
# ============================================================
logging.level.org.springframework.security=WARN
logging.level.edu.comillas.icai.gitt.pat.spring=INFO
logging.level.root=WARN

spring.jpa.show-sql=false

# Consola H2 desactivada en producción
spring.h2.console.enabled=false

# Correo activado en producción (configurar variables de entorno)
mail.enabled=true
spring.mail.username=${MAIL_USERNAME:tucorreo@gmail.com}
spring.mail.password=${MAIL_PASSWORD:tupassword}
