# ============================================================
# Configuración común (se aplica a todos los perfiles)
# Activa el perfil deseado al arrancar:
#   java -jar app.jar --spring.profiles.active=dev   (desarrollo)
#   java -jar app.jar --spring.profiles.active=prod  (producción)
# ============================================================
server.port=${PORT:8080}

# Base de datos H2 en disco
spring.datasource.url=jdbc:h2:file:./dbdata
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Consola H2 (solo en desarrollo)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logs por defecto
logging.level.org.springframework.security=INFO
logging.level.edu.comillas.icai.gitt.pat.spring=DEBUG

# Correo (desactivado por defecto)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=tucorreo@gmail.com
spring.mail.password=tupassword
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
mail.enabled=false
